defaults:
  - dataset: kitti_360_sscbench
  - model: dino_da_depth_prior
  - renderer: pixelnerf
  - training: semantic
  - validation: semantic
  - downstream: semantic
  - _self_

training_type: "downstream_training"
mode: "nvs"
seed: 0
backend: null
nproc_per_node: null
with_amp: true
name: "training"
batch_size: 1
gradient_accum_factor: 1
num_workers: 6

renderer:
  n_coarse: 32
  n_fine: 0
  n_fine_depth: 0
  depth_std: 1.0
  sched: []
  white_bkgd: false
  lindisp: true
  hard_alpha_cap: true
  render_mode: volumetric
  eval_batch_size: 65536
  normalize_dino: true

output:
  path: "out/ssc-paper"
  unique_id: semantic-dino-da-depth-prior-kitti-360-sscbench-2026-6-28-23-27

training:
  epoch_length: 1000
  resume_from: "/mnt/sdc/wy/code/scenedino_1/dino_cos_sim_best_model_5_dino_cos_sim=0.5839.pt"

  optimizer:
    args:
      lr: 5e-4

model:
  sample_radius_3d: 0.5

downstream:
  input_dim: 768
  mode: "3d"
  # mlp_head: true
