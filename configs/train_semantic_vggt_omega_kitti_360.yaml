defaults:
  - dataset: kitti_360_sscbench
  - model: vggt_omega_adapter
  - renderer: pixelnerf
  - training: semantic
  - validation: semantic
  - downstream: semantic
  - _self_

training_type: "downstream_training"
mode: "nvs"
seed: 0
backend: null
nproc_per_node: null
with_amp: true
name: "training"
batch_size: 1
gradient_accum_factor: 1
num_workers: 4

renderer:
  n_coarse : 32
  n_fine : 0
  n_fine_depth : 0
  depth_std : 1.0
  sched : []
  white_bkgd : false
  lindisp: true
  hard_alpha_cap: true
  render_mode: volumetric
  eval_batch_size: 65536
  normalize_dino: true

output:
  path: "out/ssc-paper"
  unique_id: semantic-vggt-omega-kitti-360-sscbench-lora-exp-002-test_6_22

training:
  epoch_length: 1000
  resume_from: "/mnt/sdc/wy/code/scenedino_1/out/features-paper/scenedino-vggt-omega-kitti-360-sscbench-lora-exp-002-test/dino_cos_sim_best_model_2_dino_cos_sim=0.9992.pt"
  from_pretrained: "/mnt/sdc/wy/code/scenedino_1/out/features-paper/scenedino-vggt-omega-kitti-360-sscbench-lora-exp-002-test/dino_cos_sim_best_model_2_dino_cos_sim=0.9992.pt"

  # Keep the default semantic training target and additionally train only the
  # VGGT-Omega LoRA parameters injected in the encoder. The rest of VGGT-Omega
  # and the SceneDINO feature model stay frozen, matching downstream defaults.
  train_vggt_lora: true
  vggt_lora_lr_factor: 1.0

  optimizer:
    args:
      lr: 1e-4

model:
  sample_radius_3d: 0.5

downstream:
  input_dim: 256
  mode: "3d"
  # mlp_head: true
