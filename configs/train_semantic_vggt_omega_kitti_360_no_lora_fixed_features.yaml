defaults:
  - dataset: kitti_360_sscbench
  - model: vggt_omega_adapter
  - renderer: pixelnerf
  - training: semantic
  - validation: semantic
  - downstream: semantic
  - _self_

training_type: "downstream_training"
mode: "nvs"
seed: 0
backend: null
nproc_per_node: null
with_amp: true
name: "training"
batch_size: 1
gradient_accum_factor: 1
num_workers: 4

renderer:
  n_coarse: 32
  n_fine: 0
  n_fine_depth: 0
  depth_std: 1.0
  sched: []
  white_bkgd: false
  lindisp: true
  hard_alpha_cap: true
  render_mode: volumetric
  eval_batch_size: 65536
  normalize_dino: true

output:
  path: "out/ssc-paper"
  unique_id: semantic-vggt-omega-kitti-360-sscbench-no-lora-fixed-features

model:
  sample_radius_3d: 0.5
  # Match the first-stage no-LoRA VGGT-Omega checkpoint structure.
  encoder:
    lora:
      enabled: false

training:
  epoch_length: 1000
  resume_from: null
  from_pretrained: "/mnt/sdc/wy/code/scenedino_1/out/features-paper/scenedino-vggt-omega-kitti-360-sscbench/dino_cos_sim_best_model_4_dino_cos_sim=0.8917.pt"

  # Fixed-feature downstream training: keep the loaded VGGT-Omega and SceneDINO
  # parameters frozen, and train only the semantic downstream head.
  train_vggt_lora: false
  vggt_lora_lr_factor: 1.0

  optimizer:
    args:
      lr: 5e-4

downstream:
  input_dim: 256
  mode: "3d"
  # mlp_head: true
